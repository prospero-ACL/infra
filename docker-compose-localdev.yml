services:
  pgvector:
    image: "pgvector/pgvector:pg16"
    env_file:
      - .env.localdev
    environment:
      - "POSTGRES_DB=${POSTGRES_DB}"
      - "POSTGRES_USERNAME=${POSTGRES_USERNAME}"
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.localdev
    ports:
      - "8000:8000"
    depends_on:
      - "pgvector"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.localdev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - node_modules:/app/node_modules
    env_file:
      - .env.localdev
    depends_on:
      - "backend"

volumes:
  node_modules:
